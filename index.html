<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Gilmore's Stock Market</title>
    <!-- Connecting the CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <h1>Mr. Gilmore's Stock Market</h1>
        <h2>Balance: $<span id="balance">1000.00</span></h2>
    </header>

    <main>
        <table id="market">
            <thead>
                <tr>
                    <th>Stock Name</th>
                    <th>Current Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="stock-body">
                <!-- Data will be injected here by script.js -->
            </tbody>
        </table>

        <div class="chart-container">
            <h3>Price History</h3>
            <canvas id="stockChart"></canvas>
        </div>
    </main>

    <!-- Connecting the JS file -->
    <script src="script.js"></script>
</body>
</html>
