<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meme Sound Board</title>
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <h1>soundboard</h1>
    <p>click a card to play</p>

    <div class="grid">
        <button class="container btn" data-sound="faah">
            <div class="emoji">🗣</div>
            <div class="name">️faah</div>
        </button>

        <button class="container btn" data-sound="rizz">
            <div class="emoji">🗿</div>
            <div class="name">rizz</div>
        </button>

        <button class="container btn" data-sound="vine_boom">
            <div class="emoji">🤨</div>
            <div class="name">vine boom</div>
        </button>

        <button class="container btn" data-sound="tacobell">
            <div class="emoji">🔔</div>
            <div class="name">taco bell</div>
        </button>

        <button class="container btn" data-sound="what_the_dog_doin">
            <div class="emoji">🐕</div>
            <div class="name">what the dog doin</div>
        </button>

        <button class="container btn" data-sound="wow">
            <div class="emoji">😮</div>
            <div class="name">wow</div>
        </button>

        <button class="container" data-sound="bruh">
            <div class="emoji">😑</div>
            <div class="name">bruh</div>
        </button>

        <button class="container btn" data-sound="oof">
            <div class="emoji">💔</div>
            <div class="name">oof</div>
        </button>

        <button class="container btn" data-sound="what_the_hell">
            <div class="emoji">😲</div>
            <div class="name">what the hell</div>
        </button>

        <button class="container btn" data-sound="huh">
            <div class="emoji">⁉️</div>
            <div class="name">huh</div>
        </button>

        <button class="container btn" data-sound="error">
            <div class="emoji">❌</div>
            <div class="name">error</div>
        </button>

        <button class="container btn" data-sound="omg">
            <div class="emoji">🫨</div>
            <div class="name">omg</div>
        </button>

        <button class="container btn" data-sound="stonks">
            <div class="emoji">📈</div>
            <div class="name">stonks</div>
        </button>
    </div>

<script src="index.js" charset="UTF-8"></script>
</body>

<footer>
    <p>built by Sabrina 🤍</p>
</footer>
</html>
